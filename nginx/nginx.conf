user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Static assets — aggressive cache (Vite hashes filenames)
        location ~* \.(js|css|woff2?|svg|ico|png|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Proxy API + SSE to admin_ui backend
        location /api/ {
            proxy_pass http://admin-ui-backend:9001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Cookie $http_cookie;
            proxy_read_timeout 35s;
        }

        # SSE for model download progress (long-lived)
        location ~ ^/models/.+/progress$ {
            proxy_pass http://admin-ui-backend:9001;
            proxy_set_header Host $host;
            proxy_set_header Cookie $http_cookie;
            proxy_buffering off;
            proxy_read_timeout 600s;
        }

        # Health
        location /health {
            access_log off;
            default_type text/plain;
            return 200 "ok\n";
        }

        # SPA fallback
        location / {
            try_files $uri $uri/ /200.html;
        }
    }
}
